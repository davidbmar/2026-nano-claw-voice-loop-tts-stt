<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>nano-claw voice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="status-bar">
      <span id="status-text">Connecting...</span>
    </header>

    <div id="debug-panel" class="debug-collapsed">
      <button id="debug-toggle">Debug</button>
      <div id="debug-content"></div>
    </div>

    <section id="goal-region-card" class="hidden" aria-live="polite">
      <div class="flow-card-header">
        <span>Goal region</span>
        <span id="flow-outcome" class="flow-outcome hidden"></span>
      </div>
      <p id="flow-goal" class="flow-goal"></p>
      <div class="flow-slots" aria-label="Scheduler slots">
        <div id="flow-slot-job" class="flow-slot flow-slot-empty">
          <span class="flow-slot-label">Job</span>
          <span id="flow-slot-job-value" class="flow-slot-value">empty</span>
        </div>
        <div id="flow-slot-start" class="flow-slot flow-slot-empty">
          <span class="flow-slot-label">Start</span>
          <span id="flow-slot-start-value" class="flow-slot-value">empty</span>
        </div>
        <div id="flow-slot-duration" class="flow-slot flow-slot-empty">
          <span class="flow-slot-label">Duration</span>
          <span id="flow-slot-duration-value" class="flow-slot-value">empty</span>
        </div>
      </div>
      <div class="flow-meta">
        <span id="flow-budget">turn 0 / 0</span>
        <span id="flow-latency">supervisor —</span>
      </div>
      <div id="flow-rejections" class="flow-rejections hidden">
        <div class="flow-rejections-title">Validator rejected</div>
        <ul id="flow-rejections-list"></ul>
      </div>
    </section>

    <main id="chat-log"></main>

    <footer id="controls">
      <div id="text-input-row">
        <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off" disabled>
        <button id="send-btn" disabled>Send</button>
      </div>
      <button id="settings-btn" type="button" title="Pipeline settings">⚙</button>
      <div id="pipeline-panel" class="hidden">
        <div class="pipe-row"><label for="stt-select">STT (Whisper)</label>
          <select id="stt-select">
            <option value="tiny">tiny</option><option value="base" selected>base</option>
            <option value="small">small</option><option value="medium">medium</option>
          </select></div>
        <div class="pipe-row"><label for="model-select">LLM</label>
          <select id="model-select"></select></div>
        <div class="pipe-row"><label for="vad-select" title="Speech detection on the phone line (new calls)">VAD (phone)</label>
          <select id="vad-select"></select></div>
        <div class="pipe-row"><label for="flow-select" title="Goal flow for new browser sessions and phone calls">Flow</label>
          <div class="pipe-control-stack">
            <select id="flow-select"></select>
            <span id="flow-warning" class="pipe-warning hidden">Scheduler availability is unavailable</span>
          </div></div>
        <div id="voice-row">
          <label for="voice-select">Voice</label>
          <select id="voice-select" disabled></select>
          <button id="voice-preview-btn" type="button" title="Preview voice" disabled>▶</button>
          <span id="speed-control">
            <label for="speed-slider">Speed</label>
            <input id="speed-slider" type="range" min="0.5" max="2" step="0.1" value="1">
            <span id="speed-value">1.0×</span>
          </span>
        </div>
      </div>
      <button id="stop-btn" class="hidden">Stop</button>
      <button id="talk-btn" type="button" aria-pressed="false" disabled>Start Hands-Free Phone Mode</button>
      <p id="phone-mode-help">Click once before dialing. Claude will listen, answer, and resume listening automatically.</p>
    </footer>
  </div>

  <div id="debug-modal-overlay">
    <div id="debug-modal">
      <div id="debug-modal-title">Iteration Detail</div>
      <div id="debug-modal-body"></div>
      <button id="debug-modal-close">Close</button>
    </div>
  </div>

  <script src="phone-vad.js"></script>
  <script src="voice-ui.js"></script>
  <script src="barge-in.js"></script>
  <script src="pipeline.js"></script>
  <script src="app.js"></script>
</body>
</html>
